set -g default-terminal "tmux-256color"
set -g renumber-windows on
set-option -sg escape-time 10
set-option -g focus-events on
# Enable hyperlink support for supported terminals (tmux 3.2 and above)
set -as terminal-features ",xterm-kitty:hyperlinks"
set -as terminal-features ",wezterm:hyperlinks"
# Enable RGB true color and extended terminal features
set -as terminal-features ",xterm-kitty:RGB:extkeys:sync"
set -as terminal-features ",wezterm:RGB:extkeys:sync"

# Ensure tmux handles terminal overrides correctly for standard outer variables
set -as terminal-overrides ",xterm*:Tc"
set -as terminal-overrides ",kitty*:Tc"

set -g allow-passthrough on

set -ga terminal-features ',wezterm:RGB'
set -ga terminal-features ',xterm-256color:RGB'
set -ga terminal-features ',tmux-256color:RGB'

unbind C-b
set-option -g prefix C-h
bind-key C-h send-prefix

# Split stuff
bind | split-window -h -c "#{?@vim_cwd,#{@vim_cwd},#{pane_current_path}}"
bind - split-window -v -c "#{?@vim_cwd,#{@vim_cwd},#{pane_current_path}}"
bind o select-pane -R \; kill-pane \; split-window -h -c "#{?@vim_cwd,#{@vim_cwd},#{pane_current_path}}" \; send-keys 'opencode' Enter -c "#{?@vim_cwd,#{@vim_cwd},#{pane_current_path}}"
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

unbind Up
unbind Down
unbind Left
unbind Right

bind Up resize-pane -U 10
bind Down resize-pane -D 10
bind Left resize-pane -L 10
bind Right resize-pane -R 10


# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

unbind u
#bind u attach -c "#{pane_current_path}"
bind u source-file ~/.tmux.conf

bind-key F run-shell "~/src/dnv/tmux-strap/tmux-workbench.sh --flip"
bind-key -Tcopy-mode-vi 'v' send -X begin-selection

# List of plugins

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'bjornsnoen/tmux-copilot'

set -g @override_copy_command 'wl-copy'

set -g @dracula-plugins "custom:copilot_quota.sh battery weather time"
set -g @dracula-custom-plugin-colors "cyan dark_gray"
set -g @dracula-show-powerline true
set -g @dracula-show-flags true
set -g @dracula-military-time true
set -g @dracula-show-timezone true
set -g @dracula-show-left-icon smiley
set -g @dracula-left-icon-padding 0
set -g @dracula-show-fahrenheit false

set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore "on"
set -g @continuum-save-interval "15"

run -b '~/.tmux/plugins/tpm/tpm'
