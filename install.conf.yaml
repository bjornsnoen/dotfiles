- defaults:
    link:
      relink: true
      create: true

- clean: ["~", "~/.codex"]

- clean:
    ~/.config:
      recursive: true

- ifarch:
    - git:
        "~/yay":
          url: https://aur.archlinux.org/yay.git

    - shell:
        - [cd ~/yay && makepkg -si --noconfirm, "Install yay"]
        - [rm -rf ~/yay, "Remove yay git clone"]

    - yay:
        - dotnet-sdk
        - flameshot
        - kitty
        - kitty-terminfo
        - imagemagick
        - lazydocker
        - light-locker
        - mise
        - neovim
        - tree-sitter-cli
        - playerctl
        - ripgrep
        - tmux
        - zsh
        - thefuck
        - hushboard-git
        - yad
        - xdotool
        - cbatticon
        - fzf
        - mate-polkit
        - bitwarden

        - usage
        - noto-fonts-emoji
        - ttf-roboto
        - ttf-font-awesome
        - otf-font-awesome

- link:
    # Shell / classic home dotfiles
    ~/.tmux.conf: home/tmux.conf
    ~/.aliases: home/aliases
    ~/.gitconfig: home/gitconfig
    ~/.gitignore: home/gitignore
    ~/.zprofile: home/zprofile
    ~/.zshenv: home/zshenv
    ~/.zshrc: home/zshrc
    ~/.ackrc: home/ackrc

    # Scripts
    ~/.local/bin/azpr: scripts/azpr
    ~/.local/bin/copilot: scripts/copilot
    ~/.local/bin/direnv-to-mise: scripts/migrate-envrc-aliases-to-mise.py
    ~/.local/bin/taskbar-autohide: scripts/taskbar-autohide

    # App configs (~/.config mirrors)
    ~/.config/kitty: config/kitty
    ~/.config/nvim: config/nvim
    ~/.config/mise: config/mise
    ~/.config/atuin: config/atuin
    ~/.config/fontconfig: config/fontconfig
    ~/.config/hypr: config/hypr
    ~/.config/waybar: config/waybar
    ~/.config/dunst/dunstrc: config/dunstrc
    ~/.config/ripgreprc: config/ripgreprc
    ~/.config/composer/composer.json: config/composer.json
    ~/.config/pypoetry/config.toml: config/pypoetry.toml
    ~/.config/libvirt/libvirt.conf: config/libvirt.conf
    ~/.config/worktrunk/config.toml: config/worktrunk.toml
    ~/.config/wireplumber/wireplumber.conf.d/51-bluez-config.conf: config/wireplumber/51-bluez-config.conf
    ~/.config/pipewire/pipewire.conf.d/switch-on-connect.conf: config/pipewire/switch-on-connect.conf
    ~/.config/opencode/opencode.json: config/opencode/opencode.json
    ~/.config/opencode/tui.json: config/opencode/tui.json

    # Fonts
    ~/.local/share/fonts/WifiFont.ttf: fonts/DejaVuSansMono-wifi-ramp.ttf

    # Agent instructions
    ~/.codex/AGENTS.md: agents/GLOBAL_AGENTS.md
    ~/.copilot/copilot-instructions.md: agents/GLOBAL_AGENTS.md
    ~/.config/opencode/AGENTS.md: agents/GLOBAL_AGENTS.md

- shell:
    - [
        'if command -v mise >/dev/null 2>&1 || [ -x "$HOME/.local/bin/mise" ]; then :; else curl -fsSL https://mise.run | sh; fi',
        "Install mise",
      ]

- git:
    "~/.tmux/plugins/tpm":
      url: https://github.com/tmux-plugins/tpm

- shell: # Finalize installs
    - command: PATH="$HOME/.local/bin:$PATH" mise install --yes
      description: Install mise tools
      stdout: true
      stderr: true
    - command: sudo ./scripts/setup-github-authorized-keys
      description: Trust GitHub public keys for ssh logins (needs sudo)
      stdin: true
      stdout: true
      stderr: true
    - [
        'if [ ! -d ~/.oh-my-zsh ]; then sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended --keep-zshrc; fi',
        Install ohmyzsh,
      ]
    - [
        "tmux new-session -d && tmux run '~/.tmux/plugins/tpm/scripts/install_plugins.sh' || true && tmux kill-session -t $(tmux ls -F '#{session_name}' | tail -n 1)",
        Install tmux plugins,
      ]
    - [nvim --headless '+Lazy! sync' +qa, Install vim plugins]
    - command: 'if [[ "$(echo $SHELL)" != "$(cat /etc/shells | grep zsh | tail -n 1)" ]]; then chsh -s $(cat /etc/shells | grep zsh | tail -n 1); fi'
      description: Switch to using zsh
      stdin: true
      stdout: true
      stderr: true

# Dracula custom plugin wrapper; has to be after tmux plugins are installed
- link:
    ~/.tmux/plugins/tmux/scripts/copilot_quota.sh: scripts/copilot_quota.sh

- git: # Has to be after oh-my-zsh install
    "~/.oh-my-zsh/custom/plugins/zsh-autosuggestions":
      url: https://github.com/zsh-users/zsh-autosuggestions
